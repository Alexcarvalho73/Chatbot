# Configuração para o Nginx na OCI
# Caminho sugerido: /etc/nginx/sites-available/default (ou o arquivo que você usa para o Dízimo)

server {
    listen 80;
    server_name seu_dominio_ou_ip;

    # Seu projeto principal (Dízimo)
    location / {
        proxy_pass http://localhost:5000; # Ou a porta que o Flask está usando
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Configuração para o ChatBot (Novo)
    location /chatbot/ {
        proxy_pass http://localhost:3000/; # Barra no final é importante
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ajuste de cookies para funcionar no subcaminho
        proxy_cookie_path / /chatbot/;
    }
}
